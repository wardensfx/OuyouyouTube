x-backend-common: &backend-common
  build: ./server
  container_name: ouyouyoutube-backend
  env_file: ./server/.env
  environment:
    REDIS_URL: redis://redis:6379/0
    # `include_granted_scopes=true` (auth.py) fait remonter aussi les scopes
    # accordés lors d'une connexion précédente (auth incrémentale Google) en
    # plus de ceux demandés dans cette requête — oauthlib traite ça comme une
    # erreur par défaut. Nécessaire aussi en prod, pas juste en dev.
    OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
    # Ce docker-compose (profils dev/prod) sert à tester en LOCAL, en HTTP
    # simple (SITE_ADDRESS=:8080 par défaut, pas de domaine/TLS) — le
    # transport est donc réellement non sécurisé, dans les deux profils.
    # Le vrai déploiement HTTPS (domaine réel) passe par les quadlets
    # Podman (services/*.container), qui n'ont pas besoin de ce flag et
    # font confiance à X-Forwarded-Proto envoyé par Traefik à la place.
    OAUTHLIB_INSECURE_TRANSPORT: "1"
  depends_on:
    - redis
  restart: unless-stopped

services:
  redis:
    image: redis:7
    container_name: ouyouyoutube-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Dev : docker compose --profile dev up --watch
  # Port 8000 publié (Vite proxy `npm run dev` tape dessus en direct),
  # hot-reload via --reload + develop.watch.
  backend:
    <<: *backend-common
    profiles: ["dev"]
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    develop:
      watch:
        - action: sync
          path: ./server/app
          target: /app/app
        - action: rebuild
          path: ./server/requirements.txt

  # Prod (test local) : docker compose --profile prod up -d --build
  # Pas de port publié — seul le frontend (Caddy) doit être joignable
  # depuis l'hôte, comme dans les quadlets Podman.
  backend-prod:
    <<: *backend-common
    profiles: ["prod"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Frontend + reverse proxy Caddy — image de prod (SPA buildée + TLS auto
  # si SITE_ADDRESS est un vrai domaine). Pas utilisé en dev (front tourne
  # en direct via `npm run dev` pour le hot-reload).
  frontend:
    build: ./front
    container_name: ouyouyoutube-frontend
    profiles: ["prod"]
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:8080}
      BACKEND_ADDR: backend-prod:8000
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend-prod
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
