x-backend-common: &backend-common
  build: ./server
  container_name: ouyouyoutube-backend
  env_file: ./server/.env
  environment:
    REDIS_URL: redis://redis:6379/0
    # `include_granted_scopes=true` (auth.py) fait remonter aussi les scopes
    # accordés lors d'une connexion précédente (auth incrémentale Google) en
    # plus de ceux demandés dans cette requête — oauthlib traite ça comme une
    # erreur par défaut. Nécessaire aussi en prod, pas juste en dev.
    OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
  depends_on:
    - redis
  restart: unless-stopped

services:
  redis:
    image: redis:7
    container_name: ouyouyoutube-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Dev : docker compose --profile dev up --watch
  # Port 8000 publié (Vite proxy `npm run dev` tape dessus en direct),
  # hot-reload via --reload + develop.watch.
  backend:
    <<: *backend-common
    profiles: ["dev"]
    environment:
      REDIS_URL: redis://redis:6379/0
      # Dev only: autorise l'échange de token OAuth en http:// (localhost sans TLS).
      # Ne jamais activer ça en prod (redirect_uri doit être en https).
      OAUTHLIB_INSECURE_TRANSPORT: "1"
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    develop:
      watch:
        - action: sync
          path: ./server/app
          target: /app/app
        - action: rebuild
          path: ./server/requirements.txt

  # Prod : docker compose --profile prod up -d --build
  # Pas de port publié — seul le frontend (Caddy) doit être joignable
  # depuis l'hôte, comme dans les quadlets Podman.
  backend-prod:
    <<: *backend-common
    profiles: ["prod"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Frontend + reverse proxy Caddy — image de prod (SPA buildée + TLS auto).
  # Pas utilisé en dev (front tourne en direct via `npm run dev` pour le hot-reload).
  frontend:
    build: ./front
    container_name: ouyouyoutube-frontend
    profiles: ["prod"]
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:8080}
      BACKEND_ADDR: backend-prod:8000
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend-prod
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
