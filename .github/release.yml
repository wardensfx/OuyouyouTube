changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
  categories:
    - title: Bug Fixes 🐛
      labels:
        - bug
    - title: New Features 🎉
      labels:
        - enhancement
    - title: Documentation 📝
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
