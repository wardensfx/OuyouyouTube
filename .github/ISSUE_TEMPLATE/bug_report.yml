name: Rapport de bug
description: Signaler un comportement inattendu
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que se passe-t-il ? Que t'attendais-tu à voir ?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Observer ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environnement
      placeholder: "OS, navigateur, mode de déploiement (local / docker compose / quadlet)"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs pertinents
      description: Logs backend (`uvicorn`/`docker compose logs`) ou console navigateur, si applicable.
      render: shell
    validations:
      required: false
