name: Publish container images

on:
  # Dispatched explicitly by release-please.yml once a release is actually
  # created — see the comment there for why this can't just be
  # `on: release: published`.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [server, front]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ouyouyoutube-${{ matrix.component }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/ouyouyoutube-${{ matrix.component }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
